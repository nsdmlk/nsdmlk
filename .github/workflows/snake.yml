name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: Platane/snk@v3
        with:
          github_user_name: nsdmlk
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=bd93f9&color_dots=#44475a,#6272a4,#8be9fd,#ff79c6,#bd93f9,#f8f8f2
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
